<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-G Insect Alphabet</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, 
                #FFB6C1 0%,     /* Light Pink */
                #E6E6FA 25%,    /* Lavender */
                #B0E0E6 50%,    /* Powder Blue */
                #87CEEB 75%,    /* Sky Blue */
                #9370DB 100%    /* Medium Purple */
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .gradient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, 
                #FFB6C1, #E6E6FA, #B0E0E6, #87CEEB, #9370DB,
                #FFB6C1, #E6E6FA, #B0E0E6, #87CEEB, #9370DB
            );
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Floating butterflies */
        .butterfly {
            position: absolute;
            font-size: 30px;
            animation: butterflyFloat 25s linear infinite;
            z-index: -1;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
            opacity: 0.7;
        }

        .butterfly:nth-child(1) { animation-delay: 0s; top: 10%; left: -50px; font-size: 35px; }
        .butterfly:nth-child(2) { animation-delay: 3s; top: 20%; right: -50px; animation-duration: 20s; }
        .butterfly:nth-child(3) { animation-delay: 6s; top: 40%; left: -50px; animation-duration: 30s; font-size: 40px; }
        .butterfly:nth-child(4) { animation-delay: 9s; top: 60%; right: -50px; animation-duration: 22s; }
        .butterfly:nth-child(5) { animation-delay: 12s; top: 80%; left: -50px; animation-duration: 28s; font-size: 32px; }

        @keyframes butterflyFloat {
            0% { transform: translateX(-100px) translateY(0) rotate(0deg); }
            25% { transform: translateX(25vw) translateY(50px) rotate(90deg); }
            50% { transform: translateX(50vw) translateY(-30px) rotate(180deg); }
            75% { transform: translateX(75vw) translateY(40px) rotate(270deg); }
            100% { transform: translateX(calc(100vw + 100px)) translateY(0) rotate(360deg); }
        }

        /* Tiny flowers background */
        .tiny-flower {
            position: absolute;
            font-size: 20px;
            opacity: 0.6;
            animation: flowerFloat 8s ease-in-out infinite;
            z-index: -1;
        }

        .tiny-flower:nth-child(6) { top: 15%; left: 10%; animation-delay: 0s; color: #FF69B4; }
        .tiny-flower:nth-child(7) { top: 25%; right: 15%; animation-delay: 1s; color: #DA70D6; }
        .tiny-flower:nth-child(8) { bottom: 30%; left: 20%; animation-delay: 2s; color: #BA55D3; }
        .tiny-flower:nth-child(9) { bottom: 20%; right: 25%; animation-delay: 3s; color: #9370DB; }
        .tiny-flower:nth-child(10) { top: 50%; left: 50%; animation-delay: 4s; color: #8A2BE2; }
        .tiny-flower:nth-child(11) { top: 70%; left: 15%; animation-delay: 5s; color: #FFB6C1; }
        .tiny-flower:nth-child(12) { bottom: 15%; right: 10%; animation-delay: 6s; color: #DDA0DD; }

        @keyframes flowerFloat {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(180deg) scale(1.2); }
        }

        /* Sparkling particles */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkleTwinkle 2s infinite;
            z-index: -1;
        }

        .sparkle:nth-child(13) { top: 30%; left: 30%; animation-delay: 0s; }
        .sparkle:nth-child(14) { top: 40%; right: 40%; animation-delay: 0.5s; }
        .sparkle:nth-child(15) { bottom: 40%; left: 40%; animation-delay: 1s; }
        .sparkle:nth-child(16) { bottom: 30%; right: 30%; animation-delay: 1.5s; }

        @keyframes sparkleTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px white; }
        }

        .title {
            color: #8A2BE2;
            font-family: 'Bubblegum Sans', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 25px;
            text-shadow: 
                3px 3px 0 #FFB6C1,
                0 0 20px rgba(255, 182, 193, 0.5),
                0 0 40px rgba(138, 43, 226, 0.3);
            position: relative;
            z-index: 1;
            background: linear-gradient(45deg, #FF69B4, #9370DB, #87CEEB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title span {
            color: #9370DB;
            font-size: 1.8rem;
            display: block;
            margin-top: 10px;
            text-shadow: 
                2px 2px 0 #B0E0E6,
                0 0 15px rgba(147, 112, 219, 0.4);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            height: 75vh;
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            overflow: hidden;
            border: 5px solid;
            border-image: linear-gradient(45deg, #FF69B4, #9370DB, #87CEEB) 1;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.2),
                inset 0 0 60px rgba(255, 255, 255, 0.3),
                0 0 40px rgba(255, 105, 180, 0.3);
            z-index: 1;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: slideIn 0.8s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .slide.active {
            display: flex;
        }

        .insect-card {
            background: linear-gradient(135deg, 
                rgba(255, 182, 193, 0.9),
                rgba(230, 230, 250, 0.9),
                rgba(176, 224, 230, 0.9)
            );
            border: 8px solid var(--border-color);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            width: 360px;
            height: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.25),
                inset 0 0 80px rgba(255, 255, 255, 0.4),
                0 0 50px var(--glow-color);
            overflow: hidden;
        }

        .insect-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .insect-card:hover {
            transform: scale(1.03) rotate(2deg);
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.3),
                inset 0 0 100px rgba(255, 255, 255, 0.5),
                0 0 70px var(--glow-color);
        }

        .insect-card:hover::before {
            opacity: 1;
        }

        .insect-card:active {
            transform: scale(0.98) rotate(-1deg);
        }

        .insect-card.buzzing .insect-emoji {
            animation: insectBuzz 0.6s ease-out;
        }

        @keyframes insectBuzz {
            0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-5deg) scale(1.15); }
            20%, 40%, 60%, 80% { transform: translateX(10px) rotate(5deg) scale(1.15); }
        }

        .letter-display {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5rem;
            font-family: 'Bubblegum Sans', cursive;
            color: var(--letter-color);
            text-shadow: 
                4px 4px 0 var(--shadow-color),
                0 0 30px rgba(255, 255, 255, 0.7),
                0 0 50px var(--glow-color);
            z-index: 10;
            animation: letterFloat 4s ease-in-out infinite;
        }

        @keyframes letterFloat {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
        }

        .insect-emoji {
            font-size: 10rem;
            margin: 20px 0 30px;
            display: block;
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: emojiFloat 6s ease-in-out infinite;
        }

        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .insect-name {
            font-size: 3.2rem;
            color: #8A2BE2;
            font-family: 'Bubblegum Sans', cursive;
            font-weight: bold;
            text-shadow: 
                3px 3px 0 #B0E0E6,
                0 0 25px rgba(138, 43, 226, 0.6),
                0 0 40px rgba(255, 105, 180, 0.4);
            margin-top: 10px;
            padding: 15px 35px;
            border-radius: 25px;
            background: linear-gradient(45deg, 
                rgba(255, 182, 193, 0.8),
                rgba(230, 230, 250, 0.9),
                rgba(176, 224, 230, 0.8)
            );
            border: 4px solid #9370DB;
            position: relative;
            overflow: hidden;
        }

        .insect-name::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: nameShine 4s infinite;
        }

        @keyframes nameShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* Sound buttons */
        .sound-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            border: 4px solid #8A2BE2;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 30px rgba(255, 105, 180, 0.4),
                inset 0 0 25px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sound-btn:hover {
            background: linear-gradient(135deg, #FF1493, #C71585);
            transform: scale(1.2) rotate(15deg);
            box-shadow: 
                0 15px 35px rgba(255, 20, 147, 0.6),
                inset 0 0 35px rgba(255, 255, 255, 0.5);
        }

        .sound-btn.playing {
            background: linear-gradient(135deg, #9370DB, #8A2BE2);
            animation: soundPulse 0.7s infinite alternate;
        }

        @keyframes soundPulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(147, 112, 219, 0.5); }
            100% { transform: scale(1.15); box-shadow: 0 15px 35px rgba(147, 112, 219, 0.8); }
        }

        /* TTS button */
        .tts-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #87CEEB, #4682B4);
            border: 4px solid #5F9EA0;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 30px rgba(135, 206, 235, 0.4),
                inset 0 0 25px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .tts-btn:hover {
            background: linear-gradient(135deg, #4682B4, #4169E1);
            transform: scale(1.2) rotate(-15deg);
            box-shadow: 
                0 15px 35px rgba(70, 130, 180, 0.6),
                inset 0 0 35px rgba(255, 255, 255, 0.5);
        }

        .tts-btn.playing {
            background: linear-gradient(135deg, #20B2AA, #008080);
            animation: ttsPulse 0.8s infinite alternate;
        }

        @keyframes ttsPulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(32, 178, 170, 0.5); }
            100% { transform: scale(1.1); box-shadow: 0 15px 35px rgba(32, 178, 170, 0.8); }
        }

        /* Insect particles */
        .insect-particle {
            position: absolute;
            font-size: 28px;
            color: var(--particle-color);
            pointer-events: none;
            animation: insectFloat 2s ease-out forwards;
            text-shadow: 0 0 20px var(--particle-glow);
            z-index: 1000;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.3));
        }

        @keyframes insectFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translate(var(--tx), var(--ty)) scale(2.2) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(360deg);
            }
        }

        .nav-buttons {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            pointer-events: none;
            z-index: 5;
        }

        .nav-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9370DB, #8A2BE2);
            border: 4px solid #FFB6C1;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(147, 112, 219, 0.5);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .nav-btn:hover {
            background: linear-gradient(135deg, #8A2BE2, #9400D3);
            transform: scale(1.2);
            box-shadow: 0 15px 35px rgba(138, 43, 226, 0.7);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            background: linear-gradient(135deg, #CCCCCC, #999999);
        }

        .progress {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, 
                rgba(255, 182, 193, 0.95),
                rgba(230, 230, 250, 0.95),
                rgba(176, 224, 230, 0.95)
            );
            border: 4px solid #9370DB;
            padding: 15px 40px;
            border-radius: 35px;
            font-size: 1.4rem;
            color: #8A2BE2;
            font-weight: bold;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 25px;
            backdrop-filter: blur(5px);
            font-family: 'Bubblegum Sans', cursive;
        }

        .insect-icon {
            font-size: 2.2rem;
            animation: iconBounce 4s ease-in-out infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(8deg); }
            75% { transform: translateY(-5px) rotate(-8deg); }
        }

        .status-message {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, 
                rgba(255, 105, 180, 0.95),
                rgba(147, 112, 219, 0.95)
            );
            border: 3px solid #87CEEB;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 85%;
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            font-family: 'Nunito', sans-serif;
        }

        .status-message.error {
            background: linear-gradient(135deg, 
                rgba(220, 20, 60, 0.95),
                rgba(178, 34, 34, 0.95)
            );
        }

        .status-message.tts {
            background: linear-gradient(135deg, 
                rgba(32, 178, 170, 0.95),
                rgba(0, 128, 128, 0.95)
            );
        }

        /* Falling petals */
        .falling-petal {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
            z-index: 0;
            animation: fallPetals linear forwards;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
        }

        @keyframes fallPetals {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .title span {
                font-size: 1.5rem;
            }
            
            .letter-display {
                font-size: 4rem;
            }
            
            .insect-emoji {
                font-size: 8rem;
            }
            
            .insect-name {
                font-size: 2.5rem;
                padding: 12px 25px;
            }
            
            .insect-card {
                width: 300px;
                height: 380px;
                padding: 25px;
            }
            
            .nav-btn {
                width: 60px;
                height: 60px;
                font-size: 1.8rem;
            }
            
            .sound-btn, .tts-btn {
                width: 60px;
                height: 60px;
                font-size: 1.6rem;
            }
            
            .butterfly {
                font-size: 24px;
            }
            
            .tiny-flower {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="gradient-bg"></div>
    
    <!-- Butterflies -->
    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>
    <div class="butterfly">🦋</div>
    
    <!-- Tiny Flowers -->
    <div class="tiny-flower">🌸</div>
    <div class="tiny-flower">🌺</div>
    <div class="tiny-flower">🌼</div>
    <div class="tiny-flower">🌷</div>
    <div class="tiny-flower">💮</div>
    <div class="tiny-flower">🏵️</div>
    <div class="tiny-flower">🌹</div>
    
    <!-- Sparkles -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <h1 class="title">🦋 Insect Alphabet A-G 🐝<span>Learn about tiny creatures from A to G!</span></h1>
    
    <div class="container">
        <!-- Slides will be added by JavaScript -->
    </div>
    
    <div class="nav-buttons">
        <button class="nav-btn prev-btn" id="prevBtn">←</button>
        <button class="nav-btn next-btn" id="nextBtn">→</button>
    </div>
    
    <div class="progress" id="progress">
        <span class="insect-icon" id="currentInsectIcon">🐜</span>
        <span id="counter">A / 7</span>
        <span class="insect-icon" id="nextInsectIcon">🐝</span>
    </div>
    
    <div class="status-message" id="statusMessage"></div>

    <script>
        // INSECT ALPHABET A-G WITH HIDDEN SOUNDS
        const insects = [
            { 
                letter: 'A',
                name: 'Ant', 
                emoji: '🐜', 
                sound: 'a2.mp3', // Hidden audio file
                ttsText: 'A is for Ant! Tiny insects that work together in colonies. They carry food that is much bigger than themselves!',
                color: '#FF69B4',
                border: '#FF1493',
                glow: '#FF69B4',
                particleColor: '#FF69B4',
                letterColor: '#FF1493',
                shadowColor: '#FFB6C1'
            },
            { 
                letter: 'B',
                name: 'Bee', 
                emoji: '🐝', 
                sound: 'b2.mp3', // Hidden audio file
                ttsText: 'B is for Bee! Bees buzz while flying and help flowers grow by spreading pollen. They make delicious honey!',
                color: '#FFD700',
                border: '#FF8C00',
                glow: '#FFD700',
                particleColor: '#FFD700',
                letterColor: '#FF8C00',
                shadowColor: '#FFFACD'
            },
            { 
                letter: 'C',
                name: 'Caterpillar', 
                emoji: '🐛', 
                sound: 'c2.mp3', // Hidden audio file
                ttsText: 'C is for Caterpillar! They munch on leaves and later turn into beautiful butterflies. They have many tiny legs!',
                color: '#32CD32',
                border: '#228B22',
                glow: '#32CD32',
                particleColor: '#32CD32',
                letterColor: '#228B22',
                shadowColor: '#90EE90'
            },
            { 
                letter: 'D',
                name: 'Dragonfly', 
                emoji: '🐉', 
                sound: 'd2.mp3', // Hidden audio file
                ttsText: 'D is for Dragonfly! They have beautiful transparent wings and can fly very fast. They eat mosquitoes!',
                color: '#00CED1',
                border: '#008B8B',
                glow: '#00CED1',
                particleColor: '#00CED1',
                letterColor: '#008B8B',
                shadowColor: '#AFEEEE'
            },
            { 
                letter: 'E',
                name: 'Earthworm', 
                emoji: '🪱', 
                sound: 'e2.mp3', // Hidden audio file
                ttsText: 'E is for Earthworm! They live in soil and help plants grow by making tunnels for air and water.',
                color: '#8B4513',
                border: '#654321',
                glow: '#8B4513',
                particleColor: '#8B4513',
                letterColor: '#654321',
                shadowColor: '#DEB887'
            },
            { 
                letter: 'F',
                name: 'Firefly', 
                emoji: '✨', 
                sound: 'f2.mp3', // Hidden audio file
                ttsText: 'F is for Firefly! They light up at night with their special glowing bottoms. Like tiny flying lanterns!',
                color: '#FFFF00',
                border: '#FFD700',
                glow: '#FFFF00',
                particleColor: '#FFFF00',
                letterColor: '#FFD700',
                shadowColor: '#FFFACD'
            },
            { 
                letter: 'G',
                name: 'Grasshopper', 
                emoji: '🦗', 
                sound: 'g2.mp3', // Hidden audio file
                ttsText: 'G is for Grasshopper! They make chirping sounds by rubbing their legs together. They can jump very high!',
                color: '#7CFC00',
                border: '#32CD32',
                glow: '#7CFC00',
                particleColor: '#7CFC00',
                letterColor: '#32CD32',
                shadowColor: '#98FB98'
            }
        ];

        let currentSlide = 0;
        let currentAudio = null;
        let currentTTS = null;
        
        function init() {
            createInsectSlides();
            showSlide(0);
            setupEventListeners();
            createFallingPetals();
        }
        
        function createInsectSlides() {
            const container = document.querySelector('.container');
            
            insects.forEach((insect, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.id = `slide-${insect.letter}`;
                
                slide.innerHTML = `
                    <div class="letter-display" style="--letter-color: ${insect.letterColor}; --shadow-color: ${insect.shadowColor}; --glow-color: ${insect.glow}">
                        ${insect.letter}
                    </div>
                    <div class="insect-card" 
                         data-sound="${insect.sound}"
                         data-name="${insect.name}"
                         data-tts="${insect.ttsText}"
                         style="--border-color: ${insect.border}; --glow-color: ${insect.glow}">
                        <button class="sound-btn" 
                                data-sound="${insect.sound}"
                                data-name="${insect.name}">
                            🔊
                        </button>
                        <button class="tts-btn" 
                                data-tts="${insect.ttsText}"
                                data-name="${insect.name}">
                            🗣️
                        </button>
                        <span class="insect-emoji">${insect.emoji}</span>
                        <div class="insect-name">${insect.name}</div>
                    </div>
                `;
                
                container.appendChild(slide);
            });
        }
        
        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => slide.classList.remove('active'));
            
            if (slides[index]) {
                slides[index].classList.add('active');
                currentSlide = index;
                updateProgress();
                updateNavButtons();
                updateInsectIcons();
            }
        }
        
        function updateProgress() {
            const insect = insects[currentSlide];
            document.getElementById('counter').textContent = `${insect.letter} / ${insects.length}`;
        }
        
        function updateInsectIcons() {
            const currentInsect = insects[currentSlide];
            const nextInsect = insects[(currentSlide + 1) % insects.length];
            
            document.getElementById('currentInsectIcon').textContent = currentInsect.emoji;
            document.getElementById('nextInsectIcon').textContent = nextInsect.emoji;
        }
        
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === insects.length - 1;
        }
        
        function createInsectParticles(x, y, type = 'sound') {
            const insect = insects[currentSlide];
            const particleEmojis = type === 'sound' ? ['🌸', '🌺', '🌼', '🌷', '💮'] : ['💬', '🗣️', '📢', '🔊', '🎤'];
            const particleColors = type === 'sound' ? [insect.color, insect.particleColor, '#FFB6C1', '#E6E6FA'] : ['#87CEEB', '#4682B4', '#5F9EA0', '#20B2AA'];
            
            for (let i = 0; i < 7; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'insect-particle';
                    particle.innerHTML = particleEmojis[Math.floor(Math.random() * particleEmojis.length)];
                    particle.style.position = 'fixed';
                    
                    const angle = (i * 51.4) * (Math.PI / 180);
                    const distance = 130 + Math.random() * 50;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    
                    particle.style.setProperty('--tx', `${tx}px`);
                    particle.style.setProperty('--ty', `${ty}px`);
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.setProperty('--particle-color', particleColors[Math.floor(Math.random() * particleColors.length)]);
                    particle.style.setProperty('--particle-glow', type === 'sound' ? insect.glow : '#20B2AA');
                    particle.style.fontSize = `${30 + Math.random() * 30}px`;
                    
                    document.body.appendChild(particle);
                    
                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, 2000);
                }, i * 100);
            }
        }
        
        function showStatusMessage(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }
        
        function playInsectSound(soundUrl, element) {
            // Stop any currently playing audio
            stopAllAudio();
            
            // Add buzzing animation to card
            element.classList.add('buzzing');
            
            const soundBtn = element.querySelector('.sound-btn');
            if (soundBtn) soundBtn.classList.add('playing');
            
            // Create and play audio
            currentAudio = new Audio(soundUrl);
            
            currentAudio.oncanplaythrough = () => {
                showStatusMessage(`Listening to ${element.dataset.name}...`, 'info');
                currentAudio.play().catch(error => {
                    console.log("Autoplay prevented:", error);
                    showStatusMessage("Click the sound button to play", 'error');
                    if (soundBtn) soundBtn.classList.remove('playing');
                    element.classList.remove('buzzing');
                });
            };
            
            currentAudio.onerror = () => {
                if (soundBtn) soundBtn.classList.remove('playing');
                element.classList.remove('buzzing');
                showStatusMessage("Sound file not found. Make sure audio files are in the same folder!", 'error');
                speakTTS(element.dataset.tts, element);
            };
            
            currentAudio.onended = () => {
                if (soundBtn) soundBtn.classList.remove('playing');
                element.classList.remove('buzzing');
            };
            
            currentAudio.play().catch(error => {
                console.log("Audio play error:", error);
                showStatusMessage("Click to allow sound playback", 'error');
                if (soundBtn) soundBtn.classList.remove('playing');
                element.classList.remove('buzzing');
            });
        }
        
        function speakTTS(text, element) {
            if (!('speechSynthesis' in window)) {
                showStatusMessage("Text-to-speech not supported", 'error');
                return;
            }
            
            // Stop any currently playing TTS
            if (currentTTS) {
                speechSynthesis.cancel();
                const ttsBtn = document.querySelector('.tts-btn.playing');
                if (ttsBtn) ttsBtn.classList.remove('playing');
            }
            
            const ttsBtn = element.querySelector('.tts-btn');
            if (ttsBtn) ttsBtn.classList.add('playing');
            
            currentTTS = new SpeechSynthesisUtterance(text);
            currentTTS.rate = 0.85;
            currentTTS.pitch = 1.2;
            currentTTS.volume = 1;
            
            // Try to get a friendly voice
            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                const friendlyVoices = voices.filter(voice => 
                    voice.name.includes('Female') || 
                    voice.name.includes('Samantha') ||
                    voice.name.includes('Google UK English Female') ||
                    voice.lang.includes('en')
                );
                
                if (friendlyVoices.length > 0) {
                    currentTTS.voice = friendlyVoices[0];
                }
            }
            
            currentTTS.onstart = () => {
                showStatusMessage(`Learning about ${element.dataset.name}...`, 'tts');
            };
            
            currentTTS.onend = () => {
                if (ttsBtn) ttsBtn.classList.remove('playing');
                currentTTS = null;
            };
            
            currentTTS.onerror = () => {
                if (ttsBtn) ttsBtn.classList.remove('playing');
                showStatusMessage("Could not speak text", 'error');
                currentTTS = null;
            };
            
            speechSynthesis.speak(currentTTS);
        }
        
        function stopAllAudio() {
            // Stop any playing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                document.querySelectorAll('.sound-btn.playing').forEach(btn => {
                    btn.classList.remove('playing');
                });
                document.querySelectorAll('.insect-card.buzzing').forEach(card => {
                    card.classList.remove('buzzing');
                });
            }
            
            // Stop any TTS
            if (currentTTS) {
                speechSynthesis.cancel();
                document.querySelectorAll('.tts-btn.playing').forEach(btn => {
                    btn.classList.remove('playing');
                });
                currentTTS = null;
            }
        }
        
        function createFallingPetals() {
            const petals = ['🌸', '🌺', '🌼', '🌷', '💮', '🏵️', '🌹', '🌺'];
            
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'falling-petal';
                petal.innerHTML = petals[Math.floor(Math.random() * petals.length)];
                petal.style.left = `${Math.random() * 100}%`;
                petal.style.top = '-50px';
                petal.style.color = ['#FF69B4', '#FF1493', '#DA70D6', '#BA55D3', '#9370DB'][Math.floor(Math.random() * 5)];
                petal.style.fontSize = `${18 + Math.random() * 20}px`;
                petal.style.opacity = `${0.4 + Math.random() * 0.6}`;
                
                document.body.appendChild(petal);
                
                const duration = 4000 + Math.random() * 6000;
                petal.animate([
                    { transform: 'translateY(0) rotate(0deg)', opacity: petal.style.opacity },
                    { transform: `translateY(${window.innerHeight + 100}px) rotate(${720 + Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                });
                
                setTimeout(() => {
                    if (petal.parentNode) {
                        petal.parentNode.removeChild(petal);
                    }
                }, duration);
            }, 400);
        }
        
        function setupEventListeners() {
            document.getElementById('prevBtn').addEventListener('click', () => {
                stopAllAudio();
                if (currentSlide > 0) {
                    showSlide(currentSlide - 1);
                }
            });
            
            document.getElementById('nextBtn').addEventListener('click', () => {
                stopAllAudio();
                if (currentSlide < insects.length - 1) {
                    showSlide(currentSlide + 1);
                }
            });
            
            document.addEventListener('click', function(event) {
                const card = event.target.closest('.insect-card');
                const soundBtn = event.target.closest('.sound-btn');
                const ttsBtn = event.target.closest('.tts-btn');
                
                if (card) {
                    const sound = card.dataset.sound;
                    
                    if (sound) {
                        // Create insect particles
                        createInsectParticles(event.clientX, event.clientY, 'sound');
                        
                        // Play insect sound
                        playInsectSound(sound, card);
                    }
                }
                
                if (soundBtn) {
                    event.stopPropagation();
                    const sound = soundBtn.dataset.sound;
                    const card = soundBtn.closest('.insect-card');
                    
                    if (sound && card) {
                        createInsectParticles(event.clientX, event.clientY, 'sound');
                        playInsectSound(sound, card);
                    }
                }
                
                if (ttsBtn) {
                    event.stopPropagation();
                    const ttsText = ttsBtn.dataset.tts;
                    const card = ttsBtn.closest('.insect-card');
                    
                    if (ttsText && card) {
                        createInsectParticles(event.clientX, event.clientY, 'tts');
                        speakTTS(ttsText, card);
                    }
                }
            });
            
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft':
                    case 'a':
                        stopAllAudio();
                        if (currentSlide > 0) showSlide(currentSlide - 1);
                        break;
                    case 'ArrowRight':
                    case 'd':
                        stopAllAudio();
                        if (currentSlide < insects.length - 1) showSlide(currentSlide + 1);
                        break;
                    case ' ':
                        const insect = insects[currentSlide];
                        const currentCard = document.querySelector('.slide.active .insect-card');
                        if (currentCard) {
                            createInsectParticles(
                                currentCard.getBoundingClientRect().left + currentCard.offsetWidth/2,
                                currentCard.getBoundingClientRect().top + currentCard.offsetHeight/2,
                                'sound'
                            );
                            playInsectSound(insect.sound, currentCard);
                        }
                        break;
                    case 'Enter':
                        const currentCardTTS = document.querySelector('.slide.active .insect-card');
                        if (currentCardTTS) {
                            createInsectParticles(
                                currentCardTTS.getBoundingClientRect().left + currentCardTTS.offsetWidth/2,
                                currentCardTTS.getBoundingClientRect().top + currentCardTTS.offsetHeight/2,
                                'tts'
                            );
                            speakTTS(currentCardTTS.dataset.tts, currentCardTTS);
                        }
                        break;
                }
            });
            
            let touchStartX = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            });
            
            document.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > 50) {
                    stopAllAudio();
                    if (diff > 0 && currentSlide < insects.length - 1) {
                        showSlide(currentSlide + 1);
                    } else if (diff < 0 && currentSlide > 0) {
                        showSlide(currentSlide - 1);
                    }
                }
            });
        }
        
        window.addEventListener('load', init);
        
        if ('speechSynthesis' in window) {
            setTimeout(() => {
                speechSynthesis.getVoices();
            }, 100);
        }
        
        // Auto-play first insect on load
        setTimeout(() => {
            const firstInsect = insects[0];
            const firstCard = document.querySelector('.slide.active .insect-card');
            if (firstCard) {
                createInsectParticles(
                    firstCard.getBoundingClientRect().left + firstCard.offsetWidth/2,
                    firstCard.getBoundingClientRect().top + firstCard.offsetHeight/2,
                    'sound'
                );
                playInsectSound(firstInsect.sound, firstCard);
            }
        }, 2000);
    </script>
</body>
